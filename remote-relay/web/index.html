<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>帅斌饼干远程控制台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; height: 100vh; background: #0d1117; color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    #sidebar {
      width: 260px; min-width: 260px; border-right: 1px solid #30363d;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    h1 { font-size: 18px; color: #58a6ff; margin-bottom: 4px; }
    .status { font-size: 12px; color: #8b949e; }
    .status.connected { color: #3fb950; }
    .status.disconnected { color: #f85149; }
    #deviceList { flex: 1; overflow-y: auto; }
    .deviceItem {
      display: flex; align-items: center; gap: 10px; padding: 10px;
      border-radius: 8px; cursor: pointer; transition: background .15s;
      border: 1px solid transparent;
    }
    .deviceItem:hover { background: #161b22; }
    .deviceItem.active { border-color: #58a6ff; background: #161b22; }
    .deviceItem input { cursor: pointer; }
    .deviceItem .info { flex: 1; }
    .deviceItem .name { font-size: 14px; font-weight: 500; }
    .deviceItem .res { font-size: 11px; color: #8b949e; }
    #controls {
      display: flex; gap: 8px; flex-wrap: wrap; padding-top: 8px;
      border-top: 1px solid #30363d;
    }
    button {
      flex: 1; min-width: 70px; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #30363d; background: #21262d; color: #c9d1d9;
      cursor: pointer; font-size: 13px;
    }
    button:hover { background: #30363d; }
    button.primary { background: #1f6feb; border-color: #1f6feb; }
    button.primary:hover { background: #388bfd; }
    button.danger { background: #da3633; border-color: #da3633; }
    #main {
      flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 12px;
      overflow: hidden;
    }
    #canvasWrap {
      flex: 1; background: #010409; border: 1px solid #30363d; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; overflow: auto;
      position: relative;
    }
    canvas {
      max-width: 100%; max-height: 100%; cursor: crosshair;
      background: #000; display: block;
    }
    #log {
      height: 120px; min-height: 120px; background: #010409;
      border: 1px solid #30363d; border-radius: 8px; padding: 10px;
      font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px;
      overflow-y: auto; white-space: pre-wrap;
    }
    .hint { font-size: 12px; color: #8b949e; margin-top: 4px; }
  </style>
</head>
<body>
  <aside id="sidebar">
    <h1>远程控制台</h1>
    <div id="connStatus" class="status disconnected">未连接</div>
    <div id="deviceList"></div>
    <div class="hint">勾选多台开启群控；点击缩略图切换单控目标。</div>
    <div id="controls">
      <button id="btnBroadcast" class="primary">广播群控</button>
      <button id="btnHome">Home</button>
      <button id="btnBack">Back</button>
      <button id="btnRecent">Recent</button>
    </div>
  </aside>
  <main id="main">
    <div id="canvasWrap">
      <canvas id="view" width="960" height="540"></canvas>
    </div>
    <div id="log"></div>
  </main>

  <script>
    const host = location.hostname || '192.168.0.107';
    const WS_URL = `ws://${host}:8080/ws`;
    const logEl = document.getElementById('log');
    const listEl = document.getElementById('deviceList');
    const canvas = document.getElementById('view');
    const ctx = canvas.getContext('2d');
    const statusEl = document.getElementById('connStatus');

    let ws = null;
    let devices = {};
    let activeId = null;
    let checkedIds = new Set();
    let currentFrame = null;

    function log(msg) {
      const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.textContent = line + '\n' + logEl.textContent.slice(0, 2000);
    }

    function connect() {
      log(`正在连接 ${WS_URL}`);
      ws = new WebSocket(WS_URL);
      ws.onopen = () => {
        statusEl.textContent = '已连接';
        statusEl.className = 'status connected';
        log('WebSocket 已连接');
        send({ type: 'subscribe', ids: [] });
      };
      ws.onclose = () => {
        statusEl.textContent = '已断开，5秒后重连';
        statusEl.className = 'status disconnected';
        log('WebSocket 断开，5秒后重连');
        setTimeout(connect, 5000);
      };
      ws.onerror = (e) => log('WebSocket 错误');
      ws.onmessage = (ev) => {
        let msg;
        try {
          msg = JSON.parse(ev.data);
        } catch (err) {
          log('收到非 JSON 消息: ' + String(ev.data).slice(0, 80));
          return;
        }
        log('收到 ' + msg.type + (msg.id ? ' id=' + msg.id : '') + (msg.list ? ' count=' + msg.list.length : ''));
        if (msg.type === 'devices') handleDevices(msg.list);
        else if (msg.type === 'frame') handleFrame(msg);
        else if (msg.type === 'registered') log(`设备注册成功: ${msg.id}`);
        else if (msg.type === 'error') log('服务器错误: ' + msg.msg);
      };
    }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    function handleDevices(list) {
      devices = {};
      list.forEach(d => devices[d.id] = d);
      // 首次有设备上线且未选中时，自动选中第一个
      if (!activeId && list.length > 0 && checkedIds.size === 0) {
        activeId = list[0].id;
        checkedIds.add(activeId);
      }
      renderList();
      // 自动订阅所有设备
      send({ type: 'subscribe', ids: list.map(d => d.id) });
    }

    function renderList() {
      listEl.innerHTML = '';
      const list = Object.values(devices);
      if (list.length === 0) {
        listEl.innerHTML = '<div style="color:#8b949e;padding:10px;font-size:13px;">暂无在线设备</div>';
        return;
      }
      list.forEach(d => {
        const el = document.createElement('div');
        el.className = 'deviceItem' + (activeId === d.id ? ' active' : '');
        const checked = checkedIds.has(d.id) ? 'checked' : '';
        el.innerHTML = `
          <input type="checkbox" ${checked}>
          <div class="info">
            <div class="name">${d.model}</div>
            <div class="res">${d.width}x${d.height}</div>
          </div>
        `;
        const cb = el.querySelector('input');
        cb.addEventListener('change', (e) => {
          if (e.target.checked) checkedIds.add(d.id);
          else checkedIds.delete(d.id);
          if (checkedIds.size === 1) activeId = Array.from(checkedIds)[0];
          else activeId = null;
          renderList();
        });
        el.addEventListener('click', (e) => {
          if (e.target.tagName === 'INPUT') return;
          activeId = d.id;
          checkedIds.clear();
          checkedIds.add(d.id);
          renderList();
        });
        listEl.appendChild(el);
      });
    }

    function handleFrame(msg) {
      if (!devices[msg.id]) return;
      currentFrame = msg;
      const img = new Image();
      img.onload = () => {
        canvas.width = msg.w;
        canvas.height = msg.h;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);
      };
      img.src = 'data:image/jpeg;base64,' + msg.img;
    }

    // 坐标换算
    function toDeviceCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      return {
        x: Math.round((e.clientX - rect.left) * sx),
        y: Math.round((e.clientY - rect.top) * sy),
      };
    }

    function getTargets() {
      if (checkedIds.size > 0) return Array.from(checkedIds);
      if (activeId) return [activeId];
      return [];
    }

    function sendCommand(actionObj, target) {
      if (!target) target = getTargets().length > 1 ? 'broadcast' : (activeId || getTargets()[0]);
      if (!target) { log('未选择设备，请先点击左侧设备'); return; }
      log('发送 ' + actionObj.action + ' 到 ' + target + ' x=' + actionObj.x + ' y=' + actionObj.y);
      send({ type: 'command', target, action: actionObj });
    }

    // 鼠标手势 -> touch 序列
    let touching = false;
    let touchId = 1;
    canvas.addEventListener('mousedown', (e) => {
      touching = true;
      const p = toDeviceCoords(e);
      sendCommand({ action: 'touch', phase: 'down', id: touchId, x: p.x, y: p.y });
    });
    window.addEventListener('mousemove', (e) => {
      if (!touching) return;
      const p = toDeviceCoords(e);
      sendCommand({ action: 'touch', phase: 'move', id: touchId, x: p.x, y: p.y });
    });
    window.addEventListener('mouseup', (e) => {
      if (!touching) return;
      touching = false;
      const p = toDeviceCoords(e);
      sendCommand({ action: 'touch', phase: 'up', id: touchId, x: p.x, y: p.y });
    });

    // 快捷按键
    document.getElementById('btnHome').onclick = () => sendCommand({ action: 'key', name: 'home' });
    document.getElementById('btnBack').onclick = () => sendCommand({ action: 'key', name: 'back' });
    document.getElementById('btnRecent').onclick = () => sendCommand({ action: 'key', name: 'recent' });
    document.getElementById('btnBroadcast').onclick = () => {
      if (checkedIds.size < 2) { log('群控请先勾选至少两台设备'); return; }
      log('已切换到广播模式，后续操作将同时作用于 ' + Array.from(checkedIds).join(', '));
    };

    connect();
  </script>
</body>
</html>
